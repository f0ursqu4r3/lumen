name: Build Windows

# Electrobun can't cross-compile, so the Windows .exe has to be produced on a
# Windows runner. Trigger manually, or automatically when a release tag is pushed.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx vue-tsc --noEmit

      - name: Build renderer
        run: bunx vite build

      # `bun run production` is the macOS bash script (iconutil shim); inline the
      # equivalent stable build here. Electrobun downloads its native CLI + vendor
      # binaries on first run, so this step needs network access (GitHub provides it).
      - name: Build Windows app
        run: bunx electrobun build --env=stable

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: lumen-windows-x64
          path: build/stable-win-x64/
          if-no-files-found: error
